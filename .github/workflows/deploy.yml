name: Deploy React build to separate repo

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build

      - name: Deploy dist folder to target repo
        run: |
          cd dist
          touch .nojekyll
          git init
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "deploy: $(date '+%Y-%m-%d')"
          git branch -M main
          git remote add origin https://x-access-token:${{ secrets.DEPLOY_TOKEN }}@github.com/iamyuna/iamyuna.github.io.git
          git push -f origin main