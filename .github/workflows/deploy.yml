name: Deploy React build to separate repo

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build

      - name: Deploy dist folder to target repo
        run: | 
          git clone https://x-access-token:${{ secrets.DEPLOY_TOKEN }}@github.com/iamyuna/iamyuna.github.io.git
          rm -rf iamyuna.github.io/2026_portfolio_v2
          mkdir iamyuna.github.io/2026_portfolio_v2
          cp -r dist/* iamyuna.github.io/2026_portfolio_v2/
          cd iamyuna.github.io
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git diff --cached --quiet || git commit -m "deploy: 2026_portfolio_v2 $(date '+%Y-%m-%d')"
          git push